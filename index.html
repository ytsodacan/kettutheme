<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kettu Theme Maker</title>
    <style>
        :root {
            --bg: #313338;
            --card: #2b2d31;
            --text: #dbdee1;
            --accent: #5865f2;
            --success: #23a559;
            --danger: #f23f42;
            --input: #1e1f22;
        }

        body {
            font-family: 'gg sans', 'Segoe UI', Tahoma, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            padding: 20px;
            margin: 0;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: var(--card);
            padding: 24px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        h1 { font-size: 20px; margin-bottom: 20px; text-align: center; color: #fff; }

        .section { margin-bottom: 15px; }
        label { display: block; font-size: 12px; font-weight: bold; margin-bottom: 8px; text-transform: uppercase; color: #b5bac1; }

        input[type="text"], input[type="url"] {
            width: 100%;
            padding: 10px;
            background: var(--input);
            border: 1px solid transparent;
            border-radius: 4px;
            color: #fff;
            box-sizing: border-box;
            transition: border 0.2s;
        }

        input:focus { border-color: var(--accent); outline: none; }

        .color-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .color-input {
            display: flex;
            align-items: center;
            background: var(--input);
            padding: 5px 10px;
            border-radius: 4px;
        }

        input[type="color"] {
            border: none;
            width: 30px;
            height: 30px;
            background: none;
            cursor: pointer;
            margin-right: 10px;
        }

        .btn-group { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }

        .btn {
            padding: 12px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            color: white;
            transition: opacity 0.2s;
        }

        .btn-p { background-color: var(--accent); }
        .btn-s { background-color: #4e5058; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn:hover:not(:disabled) { filter: brightness(1.1); }

        /* Status Pills */
        #gen-status { margin-top: 15px; }
        .pill {
            display: flex;
            align-items: center;
            padding: 8px 12px;
            border-radius: 4px;
            font-size: 14px;
            font-weight: 500;
        }
        .pload { background: rgba(88, 101, 242, 0.1); color: var(--accent); border: 1px solid var(--accent); }
        .pok { background: rgba(35, 165, 89, 0.1); color: var(--success); border: 1px solid var(--success); }
        .perr { background: rgba(242, 63, 66, 0.1); color: var(--danger); border: 1px solid var(--danger); }

        .dot { width: 8px; height: 8px; border-radius: 50%; margin-right: 10px; background: currentColor; }
        .blink { animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        /* Result Area */
        #gen-result {
            margin-top: 15px;
            display: none;
            flex-direction: column;
            gap: 10px;
            background: var(--input);
            padding: 15px;
            border-radius: 4px;
        }
        .link-url {
            font-family: monospace;
            font-size: 12px;
            word-break: break-all;
            background: #000;
            padding: 8px;
            border-radius: 4px;
            margin-bottom: 8px;
        }
        .info { font-size: 12px; color: #b5bac1; line-height: 1.4; }
    </style>
</head>
<body>

<div class="container">
    <h1>🦊 Kettu Theme Maker</h1>

    <div class="section">
        <label>Theme Name</label>
        <input type="text" id="m-name" placeholder="My Awesome Theme">
    </div>

    <div class="section">
        <label>Background Image URL (Kettu Plus Only)</label>
        <input type="url" id="m-bg" placeholder="https://i.imgur.com/example.jpg">
    </div>

    <div class="color-grid">
        <div class="section">
            <label>Primary (Accent)</label>
            <div class="color-input">
                <input type="color" id="c-primary" value="#5865f2">
                <span id="v-primary">#5865F2</span>
            </div>
        </div>
        <div class="section">
            <label>Background</label>
            <div class="color-input">
                <input type="color" id="c-bg" value="#313338">
                <span id="v-bg">#313338</span>
            </div>
        </div>
        <div class="section">
            <label>Surface</label>
            <div class="color-input">
                <input type="color" id="c-surface" value="#2b2d31">
                <span id="v-surface">#2B2D31</span>
            </div>
        </div>
        <div class="section">
            <label>Text</label>
            <div class="color-input">
                <input type="color" id="c-text" value="#dbdee1">
                <span id="v-text">#DBDEE1</span>
            </div>
        </div>
    </div>

    <div class="btn-group">
        <button id="gen-btn" class="btn btn-p" onclick="genLink()">Generate Cloud Link</button>
        <button class="btn btn-s" onclick="downloadJson()">Download .json</button>
        <button class="btn btn-s" onclick="copyRaw()">Copy JSON Code</button>
    </div>

    <div id="gen-status"></div>

    <div id="gen-result">
        <div class="link-url" id="res-url"></div>
        <button class="btn btn-p" id="copy-link-btn" onclick="copyLink()">Copy URL</button>
        <div class="info">This link expires in <b>5 minutes</b>. Paste it into the Kettu app settings immediately!</div>
    </div>
</div>

<script>
    // Update text labels when colors change
    document.querySelectorAll('input[type="color"]').forEach(input => {
        input.oninput = () => {
            document.getElementById('v-' + input.id.split('-')[1]).innerText = input.value.toUpperCase();
        };
    });

    // The core JSON Generator
    function js() {
        return JSON.stringify({
            name: document.getElementById('m-name').value || "Unnamed Theme",
            author: "Kettu Maker",
            unsafe_colors: {
                brand: document.getElementById('c-primary').value,
                background_main: document.getElementById('c-bg').value,
                background_floating: document.getElementById('c-surface').value,
                text_normal: document.getElementById('c-text').value
            },
            // Custom data for your plugin
            kettu_plus: {
                bg_url: document.getElementById('m-bg').value || null,
                bg_opacity: 0.4,
                blur: 5
            }
        }, null, 2);
    }

    // Upload to Cloudflare Worker
    async function genLink() {
        const btn = document.getElementById('gen-btn');
        const status = document.getElementById('gen-status');
        const result = document.getElementById('gen-result');
        const workerUrl = "https://json.ytsodacan.workers.dev";

        btn.disabled = true;
        result.style.display = 'none';
        status.innerHTML = `<div class="pill pload"><div class="dot blink"></div>Syncing to R2 Bucket...</div>`;

        try {
            const res = await fetch(workerUrl, {
                method: "POST",
                body: js()
            });

            if (!res.ok) throw new Error('Worker rejected upload');

            const data = await res.json();
            const finalUrl = `${workerUrl}/${data.id}`;

            status.innerHTML = `<div class="pill pok"><div class="dot"></div>Link Active!</div>`;
            document.getElementById('res-url').innerText = finalUrl;
            result.style.display = 'flex';
        } catch (e) {
            status.innerHTML = `<div class="pill perr"><div class="dot"></div>Cloud Error (405/500)</div>`;
        } finally {
            btn.disabled = false;
        }
    }

    function downloadJson() {
        const blob = new Blob([js()], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = (document.getElementById('m-name').value || "theme") + ".json";
        a.click();
    }

    async function copyRaw() {
        await navigator.clipboard.writeText(js());
        alert("JSON Code copied to clipboard!");
    }

    async function copyLink() {
        const url = document.getElementById('res-url').innerText;
        await navigator.clipboard.writeText(url);
        const btn = document.getElementById('copy-link-btn');
        btn.innerText = "Copied!";
        setTimeout(() => btn.innerText = "Copy URL", 2000);
    }
</script>

</body>
</html>
